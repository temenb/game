name: Deploy Node App

on:
  repository_dispatch:
    types:
      - service-updated

run-name: Deploy ${{ github.event.client_payload.service }}

concurrency:
  group: deploy-${{ github.event.client_payload.service }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    environment: ${{ github.event.client_payload.branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Print payload
        run: |
          echo "Repo: ${{ github.event.client_payload.repo }}"
          echo "Service: ${{ github.event.client_payload.service }}"
          echo "Branch: ${{ github.event.client_payload.branch }}"
          echo "Version: ${{ github.event.client_payload.version }}"
          echo "Sha: ${{ github.event.client_payload.sha }}"

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Checkout service submodule branch
        run: |
          cd services/${{ github.event.client_payload.service }}
          git fetch origin ${{ github.event.client_payload.branch }}
          git checkout ${{ github.event.client_payload.branch }}
          git pull origin ${{ github.event.client_payload.branch }}

      - name: Build Docker image
        run: |
          docker build \
            --target prod \
            -t $REGISTRY/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.version }} \
            -f services/${{ github.event.client_payload.service }}/Dockerfile .

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.branch }}

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/service:latest

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.sha }}
                    
          docker build \
            --target predeploy \
            -t $REGISTRY/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }} \
            -f services/${{ github.event.client_payload.service }}/Dockerfile .

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.branch }}

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/predeploy:latest

          docker tag ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }} \
            ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.sha }}


      - name: Push image
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.version }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.branch }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/service:${{ github.event.client_payload.sha }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/service:latest

          docker push ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.branch }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.sha }}
          docker push ghcr.io/${{ github.event.client_payload.repo }}/predeploy:latest


  deploy:
    environment: ${{ github.event.client_payload.branch }}
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            bash -eo pipefail <<'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            docker run \
              --rm --env-file ./services/.env.${{ github.event.client_payload.service }} \
              --network game_backend \
              ghcr.io/${{ github.event.client_payload.repo }}/predeploy:${{ github.event.client_payload.version }}
            
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            EOF


            
            
