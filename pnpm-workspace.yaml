packages:
  - 'services/*'
  - 'shared/*'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  bcrypt: true
  prisma: true
  protobufjs: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - prisma
  - protobufjs
  - unrs-resolver
