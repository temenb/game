syntax = "proto3";

import "common/health.proto";
import "common/empty.proto";
import "auth.proto";
import "profile.proto";
//import "google/protobuf/timestamp.proto";

package battle;

service Battle {
  rpc Health (common.empty.Empty) returns (common.health.HealthReport);
  rpc Status (common.empty.Empty) returns (common.health.StatusInfo);
  rpc Livez (common.empty.Empty) returns (common.health.LiveStatus);
  rpc Readyz (common.empty.Empty) returns (common.health.ReadyStatus);

  rpc GetBattleByUser (auth.UserIdRequest) returns (BattleObject);
  rpc GetBattle (BattleIdRequest) returns (BattleObject);
  rpc UpsertBattle (profile.ProfileIdRequest) returns (BattleObject);
}

message BattleIdRequest {
  string battleId = 1;
}

enum BattleCellValue {
  CELL_EMPTY = 0;
  CELL_X     = 1;
  CELL_O     = 2;
}

enum BattleStatus {
  ACTIVE   = 0;
  FINISHED = 1;
}

message BattleObject {
  string                   id         = 1;
  repeated BattleCellValue cells      = 2;
  repeated string          players    = 3;
  BattleStatus             status     = 4;
  string                   winner     = 5;
//  google.protobuf.Timestamp createdAt = 6;
//  google.protobuf.Timestamp updatedAt = 7;
}
