syntax = "proto3";

import "common/health.proto";
import "common/empty.proto";
import "battle.proto";

package engine;

service Engine {
  rpc Health (common.empty.Empty) returns (common.health.HealthReport);
  rpc Status (common.empty.Empty) returns (common.health.StatusInfo);
  rpc Livez (common.empty.Empty) returns (common.health.LiveStatus);
  rpc Readyz (common.empty.Empty) returns (common.health.ReadyStatus);

//  rpc GetMyBattle (common.empty.Empty) returns (common.empty.Empty);
  rpc BattleMove (BattleMoveRequest) returns (common.empty.Empty);
  rpc BattleNew (BattleNewRequest) returns (common.empty.Empty);
}


message BattleMoveRequest {
  string battleId = 1;
  string profileId   = 2;
  int32 cellIdx = 3;
}

message BattleNewRequest {
  battle.BattleObject battle = 1;
}
