syntax = "proto3";

import "common/health.proto";
import "common/empty.proto";
import "common/error.proto";
import "common/ping.proto";
import "battle.proto";
//import "ai.proto";

package streaming;

service Streaming {
  rpc Health (common.empty.Empty) returns (common.health.HealthReport);
  rpc Status (common.empty.Empty) returns (common.health.StatusInfo);
  rpc Livez  (common.empty.Empty) returns (common.health.LiveStatus);
  rpc Readyz (common.empty.Empty) returns (common.health.ReadyStatus);
}

message BattleStreamRequest {
  oneof event {
    StartBattleRequest     start     = 1;
    BattleMoveRequest     move      = 2;
    common.ping.Ping      ping      = 3;
    LeaveBattleRequest    leave     = 4;
    common.empty.Empty    end       = 5;
    AiJoinToBattleRequest connectAi = 6;
  }
}

message BattleStreamResponse {
  oneof event {
    battle.BattleObject      battle  = 1;
    common.empty.Empty       ping    = 2;
    common.error.ErrorObject error   = 3;
  }
}

message StartBattleRequest {
  string battle_id   = 1;
}

message LeaveBattleRequest {
  string battle_id   = 1;
}

message AiJoinToBattleRequest {
  string battle_id   = 1;
}

message BattleMoveRequest {
  string battle_id = 1;
  int32  cellIdx   = 2;
}
