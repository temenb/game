syntax = "proto3";

import "common/health.proto";
import "common/empty.proto";

package spawner;

service Spawner {
  rpc Health(common.empty.Empty) returns (common.health.HealthReport);
  rpc Status(common.empty.Empty) returns (common.health.StatusInfo);
  rpc Livez(common.empty.Empty) returns (common.health.LiveStatus);
  rpc Readyz(common.empty.Empty) returns (common.health.ReadyStatus);

  rpc ListSpawns(ListSpawnsRequest) returns (ListSpawnsResponse);
  rpc GetSpawn(GetSpawnRequest) returns (SpawnObject);
  rpc ListGalaxies(ListGalaxiesRequest) returns (ListGalaxiesResponse);
}

message ListSpawnsRequest {
  string owner_id = 1;
  string galaxy_id = 2;
}

message ListSpawnsResponse {
  repeated SpawnObject spawns = 1;
}

message SpawnObject {
  string id = 1;
  SpawnType type = 2;
  int32 x = 3;
  int32 y = 4;
  int32 hp = 5;
}

enum SpawnType {
  UNKNOWN = 0;
  BASE = 1;
  ASTEROID = 2;
  PORTAL = 3;
}

message GetSpawnRequest {
  string id = 1;
}

message ListGalaxiesResponse {
  repeated Galaxy galaxies = 1;
}

message ListGalaxiesRequest {
  string owner_id = 1;
}

message Galaxy {
  string id = 1;
}
